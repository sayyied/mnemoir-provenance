name: CI
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify clean projection
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python scripts/verify_candidate.py
      - run: python -m pip install '.[test,release]'
      - run: python -m pytest -q
      - run: python -m build

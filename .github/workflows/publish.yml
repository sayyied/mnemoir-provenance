name: Publication disabled

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publication-disabled:
    name: Publication requires a new exact-release authorization
    runs-on: ubuntu-latest
    steps:
      - name: Refuse stale publication
        run: |
          echo "::error::Publication is disabled. Create and independently verify a new exact-release artifact binding before enabling an OIDC publish job."
          exit 1

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Mnemoir Provenance system architecture</title><desc id="desc">Controlled sources and a host application send events and policy to the local Mnemoir core. Canonical records live in SQLite. Recall returns citations and coverage. Markdown projections are derived. Working-memory mutation uses separate scoped authorization and returns receipts.</desc>
<style>text{font-family:system-ui,sans-serif;fill:#17202a}.box{fill:#f7f8fa;stroke:#40566f;stroke-width:2}.core{fill:#e9f2ef;stroke:#176b5b;stroke-width:3}.store{fill:#fff7e8;stroke:#8a5a00;stroke-width:2}.line{stroke:#40566f;stroke-width:2;fill:none;marker-end:url(#a)}.control{stroke:#8a5a00;stroke-width:2;stroke-dasharray:8 6;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#40566f"/></marker></defs>
<rect class="box" x="40" y="80" width="220" height="76" rx="8"/><text x="150" y="112" text-anchor="middle" font-weight="700">Host application</text><text x="150" y="136" text-anchor="middle" font-size="15">identity · scope · policy</text>
<rect class="box" x="40" y="315" width="220" height="76" rx="8"/><text x="150" y="347" text-anchor="middle" font-weight="700">Controlled sources</text><text x="150" y="371" text-anchor="middle" font-size="15">explicit exports and fixtures</text>
<rect class="core" x="420" y="185" width="300" height="120" rx="12"/><text x="570" y="230" text-anchor="middle" font-size="24" font-weight="700">Mnemoir core</text><text x="570" y="258" text-anchor="middle">ingest · recall · curate · maintain</text><text x="570" y="282" text-anchor="middle" font-size="15">Python + JSON CLI + loopback UI</text>
<rect class="store" x="900" y="70" width="220" height="86" rx="42"/><text x="1010" y="110" text-anchor="middle" font-weight="700">Local SQLite</text><text x="1010" y="134" text-anchor="middle" font-size="15">canonical state</text>
<rect class="box" x="900" y="220" width="220" height="76" rx="8"/><text x="1010" y="252" text-anchor="middle" font-weight="700">Markdown projection</text><text x="1010" y="276" text-anchor="middle" font-size="15">derived · no writeback</text>
<rect class="box" x="900" y="370" width="220" height="86" rx="8"/><text x="1010" y="405" text-anchor="middle" font-weight="700">Working-memory adapter</text><text x="1010" y="430" text-anchor="middle" font-size="15">authorized · recoverable</text>
<path class="line" d="M260 118 C330 118 350 215 420 230"/><text x="340" y="150" text-anchor="middle" font-size="14">events + scope</text><path class="line" d="M260 352 C330 352 350 280 420 260"/><text x="340" y="330" text-anchor="middle" font-size="14">events + evidence</text><path class="line" d="M720 218 C790 185 830 125 900 115"/><text x="810" y="162" text-anchor="middle" font-size="14">canonical records</text><path class="line" d="M720 255 L900 255"/><text x="810" y="242" text-anchor="middle" font-size="14">derived view</text><path class="control" d="M720 285 C800 320 830 400 900 410"/><text x="810" y="350" text-anchor="middle" font-size="14">authorization</text><path class="line" d="M900 440 C805 475 710 470 630 305"/><text x="790" y="468" text-anchor="middle" font-size="14">receipt + read-back</text>
</svg>
